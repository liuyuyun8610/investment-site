<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#4E7248" />
  <title>投資收益</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&family=Noto+Sans+TC:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.23.10/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body { background: #F5EEE2; font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
    ::-webkit-scrollbar { display: none; }
    input, select, button { font-family: inherit; outline: none; border: none; }
    button { cursor: pointer; background: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">

    const { useState, useMemo, useCallback } = React;
    const { BarChart, Bar, XAxis, YAxis, Tooltip, ResponsiveContainer, PieChart, Pie, Cell } = Recharts;

    const C = {
      bg:"#F5EEE2", card:"#FEFAF2", dark:"#EDE4D0", border:"#DDD0B8",
      t1:"#352820", t2:"#6E5C48", t3:"#A08870",
      accent:"#6A9060", accentD:"#4E7248",
      green:"#3A7050", greenBg:"#CCE8CC",
      red:"#A84838", redBg:"#F5D0C8",
      blue:"#2A5080", blueBg:"#D0E4F4",
      shadow:"rgba(50,35,20,.07)",
    };
    const PIE_C = ["#6A9060","#C0A060","#3A6090","#A07040","#8A6090"];
    const USD = 32;
    const RF = "'M PLUS Rounded 1c',sans-serif";
    const CAT = {
      "美股":{ color:"#2A5080", bg:"#D0E4F4", flag:"🇺🇸" },
      "台股":{ color:"#7A4A20", bg:"#F0DCC0", flag:"🇹🇼" },
      "基金":{ color:"#4E7248", bg:"#CCE8CC", flag:"📈" },
    };
    const MO = ["01","02","03","04","05","06","07","08","09","10","11","12"];
    const MN = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

    const SUS = [
      {id:"u1",symbol:"AAPL",qty:92.3159, buyPrice:185,  curPrice:259.34,buyDate:"2023-06-01"},
      {id:"u2",symbol:"ITB", qty:21,      buyPrice:70,   curPrice:95,    buyDate:"2023-08-01"},
      {id:"u3",symbol:"VOO", qty:54.5787, buyPrice:470,  curPrice:631.07,buyDate:"2023-04-01"},
      {id:"u4",symbol:"VTI", qty:100.4027,buyPrice:250,  curPrice:338.85,buyDate:"2023-03-01"},
      {id:"u5",symbol:"VT",  qty:68,      buyPrice:110,  curPrice:146.70,buyDate:"2023-05-01"},
      {id:"u6",symbol:"QQQ", qty:48.6279, buyPrice:460,  curPrice:618.43,buyDate:"2023-02-01"},
      {id:"u7",symbol:"TSLA",qty:22,      buyPrice:200,  curPrice:353.29,buyDate:"2023-07-01"},
      {id:"u8",symbol:"ARKK",qty:52.2681, buyPrice:55,   curPrice:72.31, buyDate:"2023-09-01"},
      {id:"u9",symbol:"PYPL",qty:33,      buyPrice:40,   curPrice:47.55, buyDate:"2024-01-01"},
      {id:"u10",symbol:"DOCU",qty:10,     buyPrice:40,   curPrice:45.64, buyDate:"2024-02-01"},
    ];
    const STW = [
      {id:"t1",cat:"台股",name:"台積電 2330",qty:10,  buyPrice:680, curPrice:920, buyDate:"2024-03-15",cur:"TWD"},
      {id:"t2",cat:"台股",name:"00878",       qty:2000,buyPrice:20.5,curPrice:22.3,buyDate:"2024-05-01",cur:"TWD"},
      {id:"t3",cat:"基金",name:"野村鴻運基金",    qty:1000,buyPrice:100,curPrice:118,buyDate:"2025-06-01",cur:"TWD"},
      {id:"t4",cat:"基金",name:"安聯台灣科技基金", qty:800, buyPrice:100,curPrice:128,buyDate:"2025-07-15",cur:"TWD"},
    ];
    const SRL = [
      {id:"r1", cat:"基金",name:"野村鴻運基金",        principal:190000,sellValue:235489,date:"2026-02-24"},
      {id:"r2", cat:"基金",name:"安聯台灣大壩基金-A類", principal:70000, sellValue:101164,date:"2026-02-24"},
      {id:"r3", cat:"基金",name:"安聯台灣科技基金",     principal:120000,sellValue:153545,date:"2026-02-24"},
      {id:"r4", cat:"基金",name:"統一奔騰基金",         principal:340000,sellValue:387689,date:"2026-02-24"},
      {id:"r5", cat:"台股",name:"台積電",              principal:75404, sellValue:88358, date:"2026-01-26"},
      {id:"r6", cat:"基金",name:"野村鴻利基金",         principal:180000,sellValue:206436,date:"2026-01-23"},
      {id:"r7", cat:"基金",name:"合庫台灣高科技基金",   principal:190000,sellValue:211919,date:"2026-01-20"},
      {id:"r8", cat:"台股",name:"元大台灣50",           principal:55188, sellValue:64689, date:"2026-01-16"},
      {id:"r9", cat:"基金",name:"復華華人世紀基金",     principal:280000,sellValue:312079,date:"2026-01-14"},
      {id:"r10",cat:"台股",name:"元大台灣50",           principal:244604,sellValue:277925,date:"2026-01-05"},
      {id:"r11",cat:"基金",name:"元大台灣卓越50ETF",    principal:780000,sellValue:831721,date:"2025-12-30"},
      {id:"r12",cat:"基金",name:"合庫台灣基金-A類",     principal:160000,sellValue:172412,date:"2025-12-23"},
    ];

    const fmt  = v => "$" + Math.round(v).toLocaleString("zh-TW");
    const fmtU = v => "$" + v.toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
    const fmtK = v => v >= 10000 ? "$" + (v/10000).toFixed(1) + "萬" : fmt(v);
    const roi  = (b,c) => b > 0 ? (c-b)/b*100 : 0;
    const td   = () => new Date().toISOString().slice(0,10);
    const SK   = {us:"ptUS",tw:"ptTW",rl:"ptRL",cash:"ptCash"};
    const ld   = (k,fb) => { try{ const r=localStorage.getItem(k); return r?JSON.parse(r):fb; }catch(e){ return fb; } };
    const sv   = (k,v)  => { try{ localStorage.setItem(k,JSON.stringify(v)); }catch(e){} };

    function Tag({v,lg}) {
      if(v==null||isNaN(v)) return null;
      const up=v>=0;
      return <span style={{fontSize:lg?13:11,fontWeight:700,padding:lg?"4px 12px":"3px 9px",borderRadius:20,background:up?C.greenBg:C.redBg,color:up?C.green:C.red,whiteSpace:"nowrap"}}>{up?"+":""}{v.toFixed(1)}%</span>;
    }
    function Chip({cat}) {
      const m=CAT[cat]||{color:C.t2,bg:C.dark,flag:"•"};
      return <span style={{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:20,background:m.bg,color:m.color}}>{m.flag} {cat}</span>;
    }
    function Inp({label,value,onChange,type="text",ph="",upper=false}) {
      return (
        <div style={{marginBottom:13}}>
          <label style={{fontSize:12,color:C.t2,fontWeight:500,display:"block",marginBottom:5}}>{label}</label>
          <input type={type} value={value} placeholder={ph}
            onChange={e=>onChange(upper?e.target.value.toUpperCase():e.target.value)}
            style={{width:"100%",padding:"11px 13px",borderRadius:12,border:"1px solid "+C.border,background:C.bg,fontSize:14,color:C.t1}}/>
        </div>
      );
    }

    async function fetchPx(syms) {
      const res = await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST", headers:{"Content-Type":"application/json"},
        body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,
          tools:[{type:"web_search_20250305",name:"web_search"}],
          messages:[{role:"user",content:"Current stock prices for "+syms.join(",")+". Reply ONLY with JSON {\"SYM\":price}. No markdown."}]
        })
      });
      if(!res.ok) throw new Error(res.status);
      const d=await res.json();
      const t=d.content.filter(b=>b.type==="text").map(b=>b.text).join("");
      const m=t.match(/\{[\s\S]*?\}/);
      if(!m) throw new Error("no json");
      return JSON.parse(m[0]);
    }

    function App() {
      const [US,  setUSR]  = useState(()=>ld(SK.us,  SUS));
      const [TW,  setTWR]  = useState(()=>ld(SK.tw,  STW));
      const [RL,  setRLR]  = useState(()=>ld(SK.rl,  SRL));
      const [CSH, setCSHR] = useState(()=>ld(SK.cash, 11964.85));
      const [tab, setTab]  = useState("overview");
      const [hv,  setHV]   = useState("us");
      const [ry,  setRY]   = useState("2026");
      const [rm,  setRM]   = useState(null);
      const [ftc, setFtc]  = useState(false);
      const [fmg, setFmg]  = useState("");
      const [lup, setLup]  = useState(null);
      const [mod, setMod]  = useState(null);
      const [ei,  setEI]   = useState(null);
      const [uf,  setUF]   = useState({symbol:"",qty:"",buyPrice:"",buyDate:td()});
      const [tf,  setTF]   = useState({cat:"台股",name:"",qty:"",buyPrice:"",curPrice:"",buyDate:td(),cur:"TWD"});
      const [rf,  setRF]   = useState({cat:"基金",name:"",principal:"",sellValue:"",date:td()});

      const sUS = v=>{ const n=typeof v==="function"?v(US):v;  setUSR(n);  sv(SK.us,n); };
      const sTW = v=>{ const n=typeof v==="function"?v(TW):v;  setTWR(n);  sv(SK.tw,n); };
      const sRL = v=>{ const n=typeof v==="function"?v(RL):v;  setRLR(n);  sv(SK.rl,n); };
      const sCSH= v=>{ const n=typeof v==="function"?v(CSH):v; setCSHR(n); sv(SK.cash,n); };

      const usS = useMemo(()=>US.map(s=>{const c=s.buyPrice*s.qty,v=s.curPrice*s.qty;return{...s,cUSD:c,vUSD:v,pUSD:v-c,rp:roi(s.buyPrice,s.curPrice)};}),[US]);
      const usT = useMemo(()=>{const c=usS.reduce((s,r)=>s+r.cUSD,0),v=usS.reduce((s,r)=>s+r.vUSD,0);return{cost:c,val:v,pnl:v-c,roi:roi(c,v),cash:CSH,tot:v+CSH};},[usS,CSH]);
      const twS = useMemo(()=>TW.map(s=>{const c=s.buyPrice*s.qty,v=s.curPrice*s.qty;return{...s,cTWD:c,vTWD:v,pTWD:v-c,rp:roi(s.buyPrice,s.curPrice)};}),[TW]);
      const twT = useMemo(()=>{const c=twS.reduce((s,r)=>s+r.cTWD,0),v=twS.reduce((s,r)=>s+r.vTWD,0);return{cost:c,val:v,pnl:v-c};},[twS]);
      const rlT = useMemo(()=>{const p=RL.reduce((s,r)=>s+(r.sellValue-r.principal),0),c=RL.reduce((s,r)=>s+r.principal,0);return{pnl:p,cost:c,roi:c>0?p/c*100:0,cnt:RL.length};},[RL]);
      const rlYr= useMemo(()=>[...new Set(RL.map(r=>r.date.slice(0,4)))].sort((a,b)=>b-a),[RL]);
      const yrRL= useMemo(()=>RL.filter(r=>r.date.startsWith(ry)),[RL,ry]);
      const mnD = useMemo(()=>MO.map((m,i)=>{const rows=yrRL.filter(r=>r.date.slice(5,7)===m);const p=rows.reduce((s,r)=>s+(r.sellValue-r.principal),0),c=rows.reduce((s,r)=>s+r.principal,0);return{month:MN[i],m,pnl:p,cost:c,roi:c>0?p/c*100:0,count:rows.length};}),[yrRL]);
      const fRL = useMemo(()=>{let b=[...RL].sort((a,b)=>b.date.localeCompare(a.date));if(rm)b=b.filter(r=>r.date.startsWith(ry)&&r.date.slice(5,7)===rm);return b;},[RL,rm,ry]);
      const pie = useMemo(()=>{const cats={};twS.forEach(s=>{cats[s.cat]=(cats[s.cat]||0)+s.vTWD;});return[{name:"美股",value:usT.val*USD},...Object.entries(cats).map(([n,v])=>({name:n,value:v}))].filter(d=>d.value>0);},[usT,twS]);

      const doFetch = useCallback(async()=>{
        setFtc(true); setFmg("搜尋中…");
        try {
          const px=await fetchPx(US.map(s=>s.symbol));
          sUS(p=>p.map(s=>{const pr=px[s.symbol]||px[s.symbol.toUpperCase()];return pr?{...s,curPrice:pr}:s;}));
          setLup(new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"}));
          setFmg("✓ 已更新 "+Object.keys(px).length+" 支");
          setTimeout(()=>setFmg(""),3000);
        } catch(e){ setFmg("❌ 更新失敗"); setTimeout(()=>setFmg(""),4000); }
        setFtc(false);
      },[US]);

      const oAdd=(t)=>{setEI(null);if(t==="us")setUF({symbol:"",qty:"",buyPrice:"",buyDate:td()});else if(t==="tw")setTF({cat:"台股",name:"",qty:"",buyPrice:"",curPrice:"",buyDate:td(),cur:"TWD"});else setRF({cat:"基金",name:"",principal:"",sellValue:"",date:td()});setMod(t);};
      const oEd=(t,x)=>{setEI(x);if(t==="us")setUF({symbol:x.symbol,qty:""+x.qty,buyPrice:""+x.buyPrice,buyDate:x.buyDate});else if(t==="tw")setTF({cat:x.cat,name:x.name,qty:""+x.qty,buyPrice:""+x.buyPrice,curPrice:""+x.curPrice,buyDate:x.buyDate,cur:x.cur});else setRF({cat:x.cat,name:x.name,principal:""+x.principal,sellValue:""+x.sellValue,date:x.date});setMod(t);};
      const svUS=()=>{if(!uf.symbol||!uf.qty||!uf.buyPrice)return;const s=uf.symbol.toUpperCase().trim();const e={symbol:s,name:s,qty:+uf.qty,buyPrice:+uf.buyPrice,curPrice:+uf.buyPrice,buyDate:uf.buyDate};ei?sUS(p=>p.map(x=>x.id===ei.id?{...e,id:x.id}:x)):sUS(p=>[...p,{...e,id:"u"+Date.now()}]);setMod(null);};
      const svTW=()=>{if(!tf.name||!tf.qty||!tf.buyPrice||!tf.curPrice)return;const e={...tf,qty:+tf.qty,buyPrice:+tf.buyPrice,curPrice:+tf.curPrice};ei?sTW(p=>p.map(x=>x.id===ei.id?{...e,id:x.id}:x)):sTW(p=>[...p,{...e,id:"t"+Date.now()}]);setMod(null);};
      const svRL=()=>{if(!rf.name||!rf.principal||!rf.sellValue||!rf.date)return;const e={...rf,principal:+rf.principal,sellValue:+rf.sellValue};ei?sRL(p=>p.map(x=>x.id===ei.id?{...e,id:x.id}:x)):sRL(p=>[...p,{...e,id:"r"+Date.now()}]);setMod(null);};
      const prv = rf.principal&&rf.sellValue&&+rf.principal>0?{pnl:+rf.sellValue-+rf.principal,roi:roi(+rf.principal,+rf.sellValue)}:null;

      const BT=({active,payload})=>{
        if(!active||!payload||!payload.length||!payload[0].payload.count)return null;
        const d=payload[0].payload;
        return <div style={{background:C.card,border:"1px solid "+C.border,borderRadius:10,padding:"10px 14px",fontSize:12}}><b style={{color:C.t1}}>{d.month}</b><div style={{color:C.green,marginTop:3}}>損益 {fmt(d.pnl)}</div><div style={{color:C.t3,marginTop:2}}>ROI {d.roi.toFixed(1)}% · {d.count}筆</div></div>;
      };

      const s=(x)=>({fontFamily:RF,...x});

      return (
        <div style={{fontFamily:"'Noto Sans TC',sans-serif",background:C.bg,minHeight:"100vh",maxWidth:480,margin:"0 auto",paddingBottom:88}}>

          {/* Header */}
          <div style={{background:C.card,borderBottom:"1px solid "+C.border,padding:"16px 18px 12px",position:"sticky",top:0,zIndex:20}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div>
                <div style={s({fontSize:21,color:C.t1})}>投資收益</div>
                <div style={{fontSize:10,color:C.t3,letterSpacing:1.2,marginTop:1}}>PORTFOLIO TRACKER</div>
              </div>
              <div style={{display:"flex",gap:7}}>
                <button onClick={()=>oAdd("tw")} style={{fontSize:11,color:C.t2,background:C.dark,borderRadius:16,padding:"5px 10px",fontWeight:500,border:"1px solid "+C.border}}>台灣 +</button>
                <button onClick={()=>oAdd("us")} style={{fontSize:11,color:C.blue,background:C.blueBg,borderRadius:16,padding:"5px 10px",fontWeight:600}}>美股 +</button>
                <button onClick={()=>oAdd("real")} style={{fontSize:11,color:"#fff",background:C.accent,borderRadius:16,padding:"5px 10px",fontWeight:600}}>月報 +</button>
              </div>
            </div>
          </div>

          {/* Tabs */}
          <div style={{display:"flex",background:C.card,borderBottom:"1px solid "+C.border}}>
            {[["overview","總覽"],["hold","持倉"],["realized","已實現"]].map(([k,l])=>
              <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:"10px 0",fontSize:12,fontWeight:500,color:tab===k?C.accentD:C.t3,borderBottom:tab===k?"2.5px solid "+C.accent:"2.5px solid transparent",transition:"all .2s"}}>{l}</button>
            )}
          </div>

          {/* OVERVIEW */}
          {tab==="overview" && <div style={{padding:"14px 14px 0"}}>
            <div style={{background:C.accentD,borderRadius:20,padding:"20px 18px",marginBottom:12}}>
              <div style={{fontSize:10,color:"rgba(255,255,255,.6)",letterSpacing:1.3,marginBottom:4}}>總資產（美股 + 台灣持倉）</div>
              <div style={s({fontSize:30,color:"#fff",marginBottom:2})}>
                {fmtK(usT.tot*USD+twT.val)}<span style={{fontSize:12,color:"rgba(255,255,255,.5)",marginLeft:6}}>TWD</span>
              </div>
              <div style={{fontSize:12,color:"rgba(255,255,255,.5)",marginBottom:14}}>美股 {fmtU(usT.tot)} USD</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
                {[["美股未實現",(usT.pnl>=0?"+":"")+fmtU(usT.pnl),usT.pnl>=0?"#C8F0D0":"#FFD0C8"],["台灣未實現",(twT.pnl>=0?"+":"")+fmtK(twT.pnl),twT.pnl>=0?"#C8F0D0":"#FFD0C8"],["已實現獲利","+"+fmtK(rlT.pnl),"#EEE8D0"]].map(([l,v,col])=>
                  <div key={l}><div style={{fontSize:10,color:"rgba(255,255,255,.5)",marginBottom:2}}>{l}</div><div style={{fontSize:12,color:col,fontWeight:600}}>{v}</div></div>
                )}
              </div>
            </div>

            <div style={{background:C.card,borderRadius:14,padding:"12px 14px",marginBottom:12,border:"1px solid "+C.border}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:12,color:C.t2,fontWeight:600}}>🇺🇸 美股帳戶</div>
                <Tag v={usT.roi} lg={true}/>
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                {[["持倉市值",fmtU(usT.val)],["現金",fmtU(usT.cash)],["帳戶總值",fmtU(usT.tot)]].map(([l,v])=>
                  <div key={l} style={{background:C.dark,borderRadius:10,padding:"9px 10px"}}>
                    <div style={{fontSize:10,color:C.t3,marginBottom:3}}>{l}</div>
                    <div style={{fontSize:12,color:C.t1,fontWeight:600}}>{v}</div>
                  </div>
                )}
              </div>
            </div>

            <div style={{background:C.card,borderRadius:16,padding:14,marginBottom:12,border:"1px solid "+C.border}}>
              <div style={{fontSize:12,color:C.t2,fontWeight:600,marginBottom:12}}>資產配置</div>
              <div style={{display:"flex",alignItems:"center",gap:12}}>
                <ResponsiveContainer width="45%" height={120}>
                  <PieChart><Pie data={pie} cx="50%" cy="50%" innerRadius={32} outerRadius={52} paddingAngle={3} dataKey="value">
                    {pie.map((_,i)=><Cell key={i} fill={PIE_C[i%PIE_C.length]}/>)}
                  </Pie></PieChart>
                </ResponsiveContainer>
                <div style={{flex:1}}>
                  {pie.map((item,i)=>{const tot=pie.reduce((s,d)=>s+d.value,0);return(
                    <div key={item.name} style={{display:"flex",alignItems:"center",marginBottom:7}}>
                      <div style={{width:9,height:9,borderRadius:3,background:PIE_C[i%PIE_C.length],marginRight:7}}/>
                      <div>
                        <div style={{fontSize:12,color:C.t1,fontWeight:500}}>{item.name}</div>
                        <div style={{fontSize:10,color:C.t3}}>{(item.value/tot*100).toFixed(0)}% · {fmtK(item.value)}</div>
                      </div>
                    </div>
                  );})}
                </div>
              </div>
            </div>

            <div style={{background:C.card,borderRadius:16,padding:14,marginBottom:16,border:"1px solid "+C.border}}>
              <div style={{fontSize:12,color:C.t2,fontWeight:600,marginBottom:10}}>持倉報酬排行</div>
              {[...usS.map(s=>({...s,cat:"美股",roi:s.rp})),...twS.map(s=>({...s,roi:s.rp}))].sort((a,b)=>b.roi-a.roi).slice(0,6).map(h=>
                <div key={h.id} style={{display:"flex",alignItems:"center",padding:"8px 0",borderBottom:"1px solid "+C.dark}}>
                  <div style={{flex:1,paddingRight:8}}>
                    <div style={{fontSize:13,color:C.t1,fontWeight:600}}>{h.symbol||h.name}</div>
                    <div style={{marginTop:3}}><Chip cat={h.cat}/></div>
                  </div>
                  <Tag v={h.roi}/>
                </div>
              )}
            </div>
          </div>}

          {/* HOLD */}
          {tab==="hold" && <div style={{padding:14}}>
            <div style={{display:"flex",background:C.dark,borderRadius:12,padding:4,marginBottom:14}}>
              {[["us","🇺🇸 美股"],["tw","🇹🇼 台灣 & 基金"]].map(([k,l])=>
                <button key={k} onClick={()=>setHV(k)} style={{flex:1,padding:"8px 0",borderRadius:9,fontSize:12,fontWeight:600,background:hv===k?C.card:"transparent",color:hv===k?C.t1:C.t3,boxShadow:hv===k?"0 1px 4px "+C.shadow:"none",transition:"all .2s"}}>{l}</button>
              )}
            </div>

            {hv==="us" && <div>
              <div style={{background:C.card,borderRadius:14,padding:"12px 14px",marginBottom:12,border:"1px solid "+C.border}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div>
                    <div style={{fontSize:11,color:C.t3}}>帳戶市值</div>
                    <div style={s({fontSize:26,color:C.t1})}>{fmtU(usT.tot)}</div>
                    <div style={{fontSize:11,color:usT.pnl>=0?C.green:C.red,fontWeight:600,marginTop:2}}>{usT.pnl>=0?"+":""}{fmtU(usT.pnl)} ({usT.roi>=0?"+":""}{usT.roi.toFixed(2)}%)</div>
                  </div>
                  <button onClick={doFetch} disabled={ftc} style={{background:ftc?C.dark:C.blueBg,color:ftc?C.t3:C.blue,borderRadius:20,padding:"8px 14px",fontSize:12,fontWeight:600,border:"1.5px solid "+(ftc?C.border:C.blue+"44"),display:"flex",alignItems:"center",gap:6}}>
                    <span style={{display:"inline-block",animation:ftc?"spin 1s linear infinite":"none"}}>↻</span>
                    {ftc?"更新中…":"更新報價"}
                  </button>
                </div>
                <div style={{display:"flex",justifyContent:"space-between"}}>
                  <div style={{fontSize:11,color:C.t3}}>現金 {fmtU(CSH)} · {US.length} 支</div>
                  <div style={{fontSize:11,color:fmg.startsWith("✓")?C.green:fmg.startsWith("❌")?C.red:C.t3,fontWeight:500}}>{fmg||(lup?"更新 "+lup:"")}</div>
                </div>
              </div>
              {[...usS].sort((a,b)=>b.vUSD-a.vUSD).map(s=>
                <div key={s.id} style={{background:C.card,borderRadius:14,padding:"12px 14px",marginBottom:10,border:"1px solid "+C.border}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div>
                      <div style={{display:"flex",alignItems:"center",gap:8}}>
                        <div style={s({fontSize:20,color:C.t1})}>{s.symbol}</div>
                        <Tag v={s.rp}/>
                      </div>
                      <div style={{fontSize:11,color:C.t3,marginTop:2}}>{s.buyDate} · {s.qty.toLocaleString()} 股</div>
                    </div>
                    <div style={{textAlign:"right"}}>
                      <div style={s({fontSize:18,color:C.t1})}>{fmtU(s.vUSD)}</div>
                      <div style={{fontSize:11,color:s.pUSD>=0?C.green:C.red,fontWeight:600,marginTop:2}}>{s.pUSD>=0?"+":""}{fmtU(s.pUSD)}</div>
                    </div>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",background:C.dark,borderRadius:10,padding:"9px 10px",marginBottom:10,gap:4}}>
                    {[["買入均價",fmtU(s.buyPrice)],["現價",fmtU(s.curPrice)],["市值TWD",fmtK(s.vUSD*USD)]].map(([l,v])=>
                      <div key={l}><div style={{fontSize:10,color:C.t3,marginBottom:2}}>{l}</div><div style={{fontSize:12,color:C.t1,fontWeight:500}}>{v}</div></div>
                    )}
                  </div>
                  <div style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.t3,marginBottom:4}}>
                      <span>成本 {fmtU(s.cUSD)}</span><span>{s.rp>=0?"+":""}{s.rp.toFixed(1)}%</span>
                    </div>
                    <div style={{background:C.dark,borderRadius:4,height:5,overflow:"hidden"}}>
                      <div style={{width:Math.min(Math.abs(s.rp)*1.5,100)+"%",height:"100%",background:s.rp>=0?C.green:C.red,borderRadius:4}}/>
                    </div>
                  </div>
                  <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
                    <button onClick={()=>oEd("us",s)} style={{fontSize:11,color:C.t2,background:C.dark,borderRadius:8,padding:"4px 12px",fontWeight:500}}>編輯</button>
                    <button onClick={()=>sUS(p=>p.filter(x=>x.id!==s.id))} style={{fontSize:11,color:C.red,background:C.redBg,borderRadius:8,padding:"4px 12px",fontWeight:500}}>刪除</button>
                  </div>
                </div>
              )}
            </div>}

            {hv==="tw" && <div>
              <div style={{background:C.dark,borderRadius:12,padding:"11px 14px",marginBottom:12,display:"flex",justifyContent:"space-between"}}>
                <div><div style={{fontSize:11,color:C.t3}}>台灣持倉市值</div><div style={s({fontSize:20,color:C.t1,marginTop:3})}>{fmtK(twT.val)}</div></div>
                <div style={{textAlign:"right"}}><div style={{fontSize:11,color:C.t3}}>未實現損益</div><div style={s({fontSize:20,color:twT.pnl>=0?C.green:C.red,marginTop:3})}>{twT.pnl>=0?"+":""}{fmtK(twT.pnl)}</div></div>
              </div>
              {twS.map(s=>
                <div key={s.id} style={{background:C.card,borderRadius:14,padding:"12px 14px",marginBottom:10,border:"1px solid "+C.border}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                    <div style={{flex:1,paddingRight:8}}>
                      <div style={{fontSize:14,color:C.t1,fontWeight:600}}>{s.name}</div>
                      <div style={{display:"flex",gap:6,marginTop:4}}><Chip cat={s.cat}/><span style={{fontSize:10,color:C.t3}}>{s.buyDate}</span></div>
                    </div>
                    <Tag v={s.rp}/>
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",background:C.dark,borderRadius:10,padding:"9px 10px",marginBottom:10,gap:4}}>
                    {[["買入",""+s.buyPrice],["現價",""+s.curPrice],["數量",""+s.qty],["損益",(s.pTWD>=0?"+":"")+fmtK(Math.abs(s.pTWD))]].map(([l,v],i)=>
                      <div key={l}><div style={{fontSize:10,color:C.t3,marginBottom:2}}>{l}</div><div style={{fontSize:11,color:i===3?(s.pTWD>=0?C.green:C.red):C.t1,fontWeight:i===3?700:500}}>{v}</div></div>
                    )}
                  </div>
                  <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
                    <button onClick={()=>oEd("tw",s)} style={{fontSize:11,color:C.t2,background:C.dark,borderRadius:8,padding:"4px 12px",fontWeight:500}}>編輯</button>
                    <button onClick={()=>sTW(p=>p.filter(x=>x.id!==s.id))} style={{fontSize:11,color:C.red,background:C.redBg,borderRadius:8,padding:"4px 12px",fontWeight:500}}>刪除</button>
                  </div>
                </div>
              )}
            </div>}
          </div>}

          {/* REALIZED */}
          {tab==="realized" && <div style={{padding:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
              <div style={{fontSize:13,color:C.t1,fontWeight:600}}>年度月報</div>
              <div style={{display:"flex",gap:6}}>
                {rlYr.map(y=><button key={y} onClick={()=>{setRY(y);setRM(null)}} style={{padding:"5px 14px",borderRadius:50,fontSize:12,fontWeight:500,background:ry===y?C.accent:C.card,color:ry===y?"#fff":C.t2,border:"1px solid "+(ry===y?C.accent:C.border)}}>{y}</button>)}
              </div>
            </div>
            {(()=>{const p=yrRL.reduce((s,r)=>s+(r.sellValue-r.principal),0),c=yrRL.reduce((s,r)=>s+r.principal,0);return(
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
                <div style={{background:C.card,borderRadius:14,padding:14,border:"1px solid "+C.border}}>
                  <div style={{fontSize:11,color:C.t3,marginBottom:6}}>{ry} 年度損益</div>
                  <div style={s({fontSize:22,color:C.green})}>{fmt(p)}</div>
                  <div style={{fontSize:11,color:C.t3,marginTop:3}}>{yrRL.length} 筆交易</div>
                </div>
                <div style={{background:C.card,borderRadius:14,padding:14,border:"1px solid "+C.border}}>
                  <div style={{fontSize:11,color:C.t3,marginBottom:6}}>年度平均投報率</div>
                  <div style={s({fontSize:22,color:C.t1})}>+{c>0?(p/c*100).toFixed(1):0}%</div>
                  <div style={{fontSize:11,color:C.t3,marginTop:3}}>投入 {fmtK(c)}</div>
                </div>
              </div>
            );})}
            <div style={{background:C.card,borderRadius:16,padding:"14px 10px 12px",marginBottom:12,border:"1px solid "+C.border}}>
              <div style={{fontSize:12,color:C.t2,fontWeight:600,marginBottom:12,paddingLeft:6}}>月度損益</div>
              <ResponsiveContainer width="100%" height={145}>
                <BarChart data={mnD} margin={{left:-18,right:4,top:4,bottom:0}} barSize={15}>
                  <XAxis dataKey="month" tick={{fontSize:10,fill:C.t3}} axisLine={false} tickLine={false}/>
                  <YAxis tick={{fontSize:9,fill:C.t3}} axisLine={false} tickLine={false} tickFormatter={v=>v===0?"0":(v/10000).toFixed(0)+"萬"}/>
                  <Tooltip content={BT} cursor={{fill:"rgba(106,144,96,.08)"}}/>
                  <Bar dataKey="pnl" fill={C.accent} radius={[5,5,0,0]}/>
                </BarChart>
              </ResponsiveContainer>
            </div>
            <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:12,marginBottom:4}}>
              <button onClick={()=>setRM(null)} style={{flexShrink:0,padding:"5px 14px",borderRadius:50,fontSize:11,fontWeight:500,background:!rm?C.accent:C.card,color:!rm?"#fff":C.t2,border:"1px solid "+(!rm?C.accent:C.border)}}>全部</button>
              {MO.filter(m=>yrRL.some(r=>r.date.slice(5,7)===m)).map(m=>
                <button key={m} onClick={()=>setRM(m)} style={{flexShrink:0,padding:"5px 14px",borderRadius:50,fontSize:11,fontWeight:500,background:rm===m?C.accent:C.card,color:rm===m?"#fff":C.t2,border:"1px solid "+(rm===m?C.accent:C.border)}}>{+m}月</button>
              )}
            </div>
            {fRL.map(r=>{const p=r.sellValue-r.principal,rt=r.principal>0?p/r.principal*100:0;return(
              <div key={r.id} style={{background:C.card,borderRadius:14,padding:"12px 14px",marginBottom:10,border:"1px solid "+C.border}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div style={{flex:1,paddingRight:8}}>
                    <div style={{fontSize:14,color:C.t1,fontWeight:600}}>{r.name}</div>
                    <div style={{display:"flex",gap:6,marginTop:4}}><Chip cat={r.cat}/><span style={{fontSize:10,color:C.t3}}>結算 {r.date}</span></div>
                  </div>
                  <Tag v={rt}/>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",background:C.dark,borderRadius:10,padding:"9px 10px",marginBottom:10,gap:4}}>
                  {[["投入本金",fmt(r.principal)],["賣出市值",fmt(r.sellValue)],["損益",(p>=0?"+":"")+fmt(p)]].map(([l,v],i)=>
                    <div key={l}><div style={{fontSize:10,color:C.t3,marginBottom:2}}>{l}</div><div style={{fontSize:11,fontWeight:i===2?700:500,color:i===2?(p>=0?C.green:C.red):C.t1}}>{v}</div></div>
                  )}
                </div>
                <div style={{display:"flex",justifyContent:"flex-end",gap:8}}>
                  <button onClick={()=>oEd("real",r)} style={{fontSize:11,color:C.t2,background:C.dark,borderRadius:8,padding:"4px 12px",fontWeight:500}}>編輯</button>
                  <button onClick={()=>sRL(p=>p.filter(x=>x.id!==r.id))} style={{fontSize:11,color:C.red,background:C.redBg,borderRadius:8,padding:"4px 12px",fontWeight:500}}>刪除</button>
                </div>
              </div>
            );})}
          </div>}

          {/* Nav */}
          <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:C.card,borderTop:"1px solid "+C.border,display:"flex",padding:"10px 0 22px",zIndex:20}}>
            {[["overview","🏠","總覽"],["hold","💼","持倉"],["realized","📊","月報"]].map(([k,icon,l])=>
              <button key={k} onClick={()=>setTab(k)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:tab===k?C.accentD:C.t3,fontSize:10,fontWeight:tab===k?600:400}}>
                <span style={{fontSize:22}}>{icon}</span>{l}
              </button>
            )}
          </div>

          {/* Modal */}
          {mod && <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"flex-end",zIndex:100,backdropFilter:"blur(5px)"}} onClick={e=>{if(e.target===e.currentTarget)setMod(null);}}>
            <div style={{background:C.card,borderRadius:"22px 22px 0 0",width:"100%",maxWidth:480,margin:"0 auto",padding:"22px 18px 36px",maxHeight:"92vh",overflowY:"auto"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}>
                <div style={s({fontSize:20,color:C.t1})}>{mod==="us"?(ei?"編輯美股":"新增美股 🇺🇸"):mod==="tw"?(ei?"編輯台灣持倉":"新增台灣 🇹🇼"):(ei?"編輯紀錄":"新增已實現 📊")}</div>
                <button onClick={()=>setMod(null)} style={{fontSize:26,color:C.t3}}>×</button>
              </div>
              {mod==="us" && <div>
                <div style={{background:C.blueBg,borderRadius:12,padding:"10px 14px",marginBottom:16,fontSize:12,color:C.blue}}>💡 新增後點「更新報價」自動取得即時價格</div>
                <Inp label="股票代號" value={uf.symbol} onChange={v=>setUF(f=>({...f,symbol:v}))} ph="NVDA" upper={true}/>
                <Inp label="持股數量" value={uf.qty} onChange={v=>setUF(f=>({...f,qty:v}))} type="number" ph="92.3"/>
                <Inp label="買入均價 (USD)" value={uf.buyPrice} onChange={v=>setUF(f=>({...f,buyPrice:v}))} type="number" ph="495"/>
                <Inp label="買入日期" value={uf.buyDate} onChange={v=>setUF(f=>({...f,buyDate:v}))} type="date"/>
                <button onClick={svUS} style={{width:"100%",background:C.blue,color:"#fff",borderRadius:14,padding:"13px",fontSize:14,fontWeight:600}}>{ei?"儲存修改":"新增持倉"}</button>
              </div>}
              {mod==="tw" && <div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:13}}>
                  {[{l:"類別",k:"cat",o:["台股","基金"]},{l:"幣別",k:"cur",o:["TWD","USD"]}].map(({l,k,o})=>
                    <div key={k}>
                      <label style={{fontSize:12,color:C.t2,fontWeight:500,display:"block",marginBottom:5}}>{l}</label>
                      <select value={tf[k]} onChange={e=>setTF(f=>({...f,[k]:e.target.value}))} style={{width:"100%",padding:"11px 13px",borderRadius:12,border:"1px solid "+C.border,background:C.bg,fontSize:13,color:C.t1}}>
                        {o.map(x=><option key={x}>{x}</option>)}
                      </select>
                    </div>
                  )}
                </div>
                <Inp label="標的名稱" value={tf.name} onChange={v=>setTF(f=>({...f,name:v}))} ph="台積電 2330"/>
                <Inp label="買入均價" value={tf.buyPrice} onChange={v=>setTF(f=>({...f,buyPrice:v}))} type="number" ph="680"/>
                <Inp label="現在價格" value={tf.curPrice} onChange={v=>setTF(f=>({...f,curPrice:v}))} type="number" ph="920"/>
                <Inp label="數量" value={tf.qty} onChange={v=>setTF(f=>({...f,qty:v}))} type="number" ph="10"/>
                <Inp label="買入日期" value={tf.buyDate} onChange={v=>setTF(f=>({...f,buyDate:v}))} type="date"/>
                {tf.buyPrice&&tf.curPrice&&+tf.buyPrice>0&&<div style={{background:C.dark,borderRadius:12,padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,color:C.t3}}>投報率預覽</span><Tag v={roi(+tf.buyPrice,+tf.curPrice)} lg={true}/></div>}
                <button onClick={svTW} style={{width:"100%",background:C.accentD,color:"#fff",borderRadius:14,padding:"13px",fontSize:14,fontWeight:600}}>{ei?"儲存修改":"新增持倉"}</button>
              </div>}
              {mod==="real" && <div>
                <div style={{marginBottom:13}}>
                  <label style={{fontSize:12,color:C.t2,fontWeight:500,display:"block",marginBottom:5}}>類別</label>
                  <select value={rf.cat} onChange={e=>setRF(f=>({...f,cat:e.target.value}))} style={{width:"100%",padding:"11px 13px",borderRadius:12,border:"1px solid "+C.border,background:C.bg,fontSize:13,color:C.t1}}>
                    <option>基金</option><option>台股</option><option>美股</option>
                  </select>
                </div>
                <Inp label="標的名稱" value={rf.name} onChange={v=>setRF(f=>({...f,name:v}))} ph="野村鴻運基金"/>
                <Inp label="投入本金 (NT$)" value={rf.principal} onChange={v=>setRF(f=>({...f,principal:v}))} type="number" ph="190000"/>
                <Inp label="賣出市值 (NT$)" value={rf.sellValue} onChange={v=>setRF(f=>({...f,sellValue:v}))} type="number" ph="235489"/>
                <Inp label="結算日期" value={rf.date} onChange={v=>setRF(f=>({...f,date:v}))} type="date"/>
                {prv&&<div style={{background:C.dark,borderRadius:12,padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:12,color:C.t3}}>損益預覽</span><span style={{display:"flex",gap:8,alignItems:"center"}}><span style={{fontSize:13,fontWeight:700,color:prv.pnl>=0?C.green:C.red}}>{prv.pnl>=0?"+":""}{fmt(prv.pnl)}</span><Tag v={prv.roi}/></span></div>}
                <button onClick={svRL} style={{width:"100%",background:C.accentD,color:"#fff",borderRadius:14,padding:"13px",fontSize:14,fontWeight:600}}>{ei?"儲存修改":"新增紀錄"}</button>
              </div>}
            </div>
          </div>}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  </script>
</body>
</html>
