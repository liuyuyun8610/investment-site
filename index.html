<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <title>投資收益</title>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@500;700&family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%}
    body{background:#F5EEE2;font-family:'Noto Sans TC',sans-serif;-webkit-tap-highlight-color:transparent}
    ::-webkit-scrollbar{display:none}
    input,select,button{font-family:inherit;outline:none;border:none}
    button{cursor:pointer;background:none}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="root"></div>
<script>
(function(){
  const {createElement:h,useState,useMemo,useCallback,Fragment} = React;
  const {BarChart,Bar,XAxis,YAxis,Tooltip,ResponsiveContainer,PieChart,Pie,Cell} = Recharts;

  // ── palette ───────────────────────────────────────────────────────────
  const BG="#F5EEE2",CARD="#FEFAF2",DARK="#EDE4D0",BDR="#DDD0B8";
  const T1="#352820",T2="#6E5C48",T3="#A08870";
  const ACC="#6A9060",ACCD="#4E7248";
  const GRN="#3A7050",GRNBG="#CCE8CC";
  const RED="#A84838",REDBG="#F5D0C8";
  const BLU="#2A5080",BLUBG="#D0E4F4";
  const PCOLS=["#6A9060","#C0A060","#3A6090","#A07040","#8A6090"];
  const UDRATE=32, RND="'M PLUS Rounded 1c',sans-serif";
  const MOS=["01","02","03","04","05","06","07","08","09","10","11","12"];
  const MNS=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
  const CATMAP={"美股":{color:"#2A5080",bg:"#D0E4F4",flag:"🇺🇸"},"台股":{color:"#7A4A20",bg:"#F0DCC0",flag:"🇹🇼"},"基金":{color:"#4E7248",bg:"#CCE8CC",flag:"📈"}};

  // ── seed data ─────────────────────────────────────────────────────────
  const SEED_US=[
    {id:"u1",sym:"AAPL",qty:92.3159, bp:185,  cp:259.34,bd:"2023-06-01"},
    {id:"u2",sym:"ITB", qty:21,      bp:70,   cp:95,    bd:"2023-08-01"},
    {id:"u3",sym:"VOO", qty:54.5787, bp:470,  cp:631.07,bd:"2023-04-01"},
    {id:"u4",sym:"VTI", qty:100.4027,bp:250,  cp:338.85,bd:"2023-03-01"},
    {id:"u5",sym:"VT",  qty:68,      bp:110,  cp:146.70,bd:"2023-05-01"},
    {id:"u6",sym:"QQQ", qty:48.6279, bp:460,  cp:618.43,bd:"2023-02-01"},
    {id:"u7",sym:"TSLA",qty:22,      bp:200,  cp:353.29,bd:"2023-07-01"},
    {id:"u8",sym:"ARKK",qty:52.2681, bp:55,   cp:72.31, bd:"2023-09-01"},
    {id:"u9",sym:"PYPL",qty:33,      bp:40,   cp:47.55, bd:"2024-01-01"},
    {id:"u10",sym:"DOCU",qty:10,     bp:40,   cp:45.64, bd:"2024-02-01"},
  ];
  const SEED_TW=[
    {id:"t1",cat:"台股",name:"台積電 2330",qty:10,  bp:680, cp:920, bd:"2024-03-15",cur:"TWD"},
    {id:"t2",cat:"台股",name:"00878",       qty:2000,bp:20.5,cp:22.3,bd:"2024-05-01",cur:"TWD"},
    {id:"t3",cat:"基金",name:"野村鴻運基金",    qty:1000,bp:100,cp:118,bd:"2025-06-01",cur:"TWD"},
    {id:"t4",cat:"基金",name:"安聯台灣科技基金", qty:800, bp:100,cp:128,bd:"2025-07-15",cur:"TWD"},
  ];
  const SEED_RL=[
    {id:"r1", cat:"基金",name:"野村鴻運基金",        p:190000,s:235489,d:"2026-02-24"},
    {id:"r2", cat:"基金",name:"安聯台灣大壩基金-A類", p:70000, s:101164,d:"2026-02-24"},
    {id:"r3", cat:"基金",name:"安聯台灣科技基金",     p:120000,s:153545,d:"2026-02-24"},
    {id:"r4", cat:"基金",name:"統一奔騰基金",         p:340000,s:387689,d:"2026-02-24"},
    {id:"r5", cat:"台股",name:"台積電",              p:75404, s:88358, d:"2026-01-26"},
    {id:"r6", cat:"基金",name:"野村鴻利基金",         p:180000,s:206436,d:"2026-01-23"},
    {id:"r7", cat:"基金",name:"合庫台灣高科技基金",   p:190000,s:211919,d:"2026-01-20"},
    {id:"r8", cat:"台股",name:"元大台灣50",           p:55188, s:64689, d:"2026-01-16"},
    {id:"r9", cat:"基金",name:"復華華人世紀基金",     p:280000,s:312079,d:"2026-01-14"},
    {id:"r10",cat:"台股",name:"元大台灣50",           p:244604,s:277925,d:"2026-01-05"},
    {id:"r11",cat:"基金",name:"元大台灣卓越50ETF",    p:780000,s:831721,d:"2025-12-30"},
    {id:"r12",cat:"基金",name:"合庫台灣基金-A類",     p:160000,s:172412,d:"2025-12-23"},
  ];

  // ── utils ─────────────────────────────────────────────────────────────
  const fmt  = v=>"$"+Math.round(v).toLocaleString("zh-TW");
  const fmtU = v=>"$"+Number(v).toLocaleString("en-US",{minimumFractionDigits:2,maximumFractionDigits:2});
  const fmtK = v=>v>=10000?"$"+(v/10000).toFixed(1)+"萬":fmt(v);
  const calcR= (b,c)=>b>0?(c-b)/b*100:0;
  const tod  = ()=>new Date().toISOString().slice(0,10);
  const rnd  = obj=>({fontFamily:RND,...obj});
  const LSKEYS={us:"inv_us",tw:"inv_tw",rl:"inv_rl",cash:"inv_cash"};
  const lsGet= (k,fb)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb;}catch(e){return fb;}};
  const lsSet= (k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}};

  // ── fetch prices ──────────────────────────────────────────────────────
  async function fetchPrices(syms){
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,
        tools:[{type:"web_search_20250305",name:"web_search"}],
        messages:[{role:"user",content:"Current stock prices for "+syms.join(",")+". Reply ONLY with JSON like {\"AAPL\":150.25}. No markdown."}]
      })
    });
    if(!res.ok)throw new Error(res.status);
    const d=await res.json();
    const t=d.content.filter(b=>b.type==="text").map(b=>b.text).join("");
    const m=t.match(/\{[^]*?\}/);
    if(!m)throw new Error("no json");
    return JSON.parse(m[0]);
  }

  // ── small components ──────────────────────────────────────────────────
  function Tag({val,large}){
    if(val==null||isNaN(val))return null;
    const up=val>=0;
    return h("span",{style:{fontSize:large?13:11,fontWeight:700,padding:large?"4px 12px":"3px 9px",borderRadius:20,background:up?GRNBG:REDBG,color:up?GRN:RED,whiteSpace:"nowrap"}},
      (up?"+":"")+val.toFixed(1)+"%");
  }
  function Badge({cat}){
    const m=CATMAP[cat]||{color:T2,bg:DARK,flag:"•"};
    return h("span",{style:{fontSize:10,fontWeight:600,padding:"2px 8px",borderRadius:20,background:m.bg,color:m.color}},m.flag+" "+cat);
  }
  function Inp({label,value,onChange,type,ph,upper}){
    return h("div",{style:{marginBottom:13}},
      h("label",{style:{fontSize:12,color:T2,fontWeight:500,display:"block",marginBottom:5}},label),
      h("input",{type:type||"text",value:value,placeholder:ph||"",
        onChange:e=>onChange(upper?e.target.value.toUpperCase():e.target.value),
        style:{width:"100%",padding:"11px 13px",borderRadius:12,border:"1px solid "+BDR,background:BG,fontSize:14,color:T1}})
    );
  }
  function Sel({label,value,onChange,options}){
    return h("div",{style:{marginBottom:13}},
      h("label",{style:{fontSize:12,color:T2,fontWeight:500,display:"block",marginBottom:5}},label),
      h("select",{value:value,onChange:e=>onChange(e.target.value),
        style:{width:"100%",padding:"11px 13px",borderRadius:12,border:"1px solid "+BDR,background:BG,fontSize:13,color:T1}},
        options.map(o=>h("option",{key:o},o)))
    );
  }

  // ── main app ──────────────────────────────────────────────────────────
  function App(){
    const [usData, setUsR]= useState(()=>lsGet(LSKEYS.us,   SEED_US));
    const [twData, setTwR]= useState(()=>lsGet(LSKEYS.tw,   SEED_TW));
    const [rlData, setRlR]= useState(()=>lsGet(LSKEYS.rl,   SEED_RL));
    const [cash,   setCaR]= useState(()=>lsGet(LSKEYS.cash, 11964.85));
    const [tab,    setTab]= useState("overview");
    const [htab,  setHtab]= useState("us");
    const [ryear, setRyear]= useState("2026");
    const [rmonth,setRmonth]= useState(null);
    const [fetching,setFetch]= useState(false);
    const [fmsg,  setFmsg]= useState("");
    const [lupd,  setLupd]= useState(null);
    const [modal, setModal]= useState(null);
    const [editObj,setEdit]= useState(null);
    const [uf,setUf]= useState({sym:"",qty:"",bp:"",bd:tod()});
    const [tf,setTf]= useState({cat:"台股",name:"",qty:"",bp:"",cp:"",bd:tod(),cur:"TWD"});
    const [rf,setRf]= useState({cat:"基金",name:"",p:"",s:"",d:tod()});

    const sUs = v=>{const n=typeof v==="function"?v(usData):v; setUsR(n); lsSet(LSKEYS.us,n);};
    const sTw = v=>{const n=typeof v==="function"?v(twData):v; setTwR(n); lsSet(LSKEYS.tw,n);};
    const sRl = v=>{const n=typeof v==="function"?v(rlData):v; setRlR(n); lsSet(LSKEYS.rl,n);};
    const sCa = v=>{const n=typeof v==="function"?v(cash):v;   setCaR(n); lsSet(LSKEYS.cash,n);};

    const usStats=useMemo(()=>usData.map(x=>{const c=x.bp*x.qty,v=x.cp*x.qty;return{...x,cost:c,val:v,pnl:v-c,roi:calcR(x.bp,x.cp)};}),[usData]);
    const usT=useMemo(()=>{const c=usStats.reduce((a,x)=>a+x.cost,0),v=usStats.reduce((a,x)=>a+x.val,0);return{cost:c,val:v,pnl:v-c,roi:calcR(c,v),cash:cash,total:v+cash};},[usStats,cash]);
    const twStats=useMemo(()=>twData.map(x=>{const c=x.bp*x.qty,v=x.cp*x.qty;return{...x,cost:c,val:v,pnl:v-c,roi:calcR(x.bp,x.cp)};}),[twData]);
    const twT=useMemo(()=>{const c=twStats.reduce((a,x)=>a+x.cost,0),v=twStats.reduce((a,x)=>a+x.val,0);return{cost:c,val:v,pnl:v-c};},[twStats]);
    const rlT=useMemo(()=>{const pn=rlData.reduce((a,x)=>a+(x.s-x.p),0),c=rlData.reduce((a,x)=>a+x.p,0);return{pnl:pn,cost:c,count:rlData.length};},[rlData]);
    const rlYears=useMemo(()=>[...new Set(rlData.map(x=>x.d.slice(0,4)))].sort((a,b)=>b-a),[rlData]);
    const yrItems=useMemo(()=>rlData.filter(x=>x.d.startsWith(ryear)),[rlData,ryear]);
    const mnBars=useMemo(()=>MOS.map((m,i)=>{const rows=yrItems.filter(x=>x.d.slice(5,7)===m);const pn=rows.reduce((a,x)=>a+(x.s-x.p),0),c=rows.reduce((a,x)=>a+x.p,0);return{month:MNS[i],m,pnl:pn,cost:c,roi:c>0?pn/c*100:0,count:rows.length};}),[yrItems]);
    const filtRl=useMemo(()=>{let b=[...rlData].sort((a,x)=>x.d.localeCompare(a.d));if(rmonth)b=b.filter(x=>x.d.startsWith(ryear)&&x.d.slice(5,7)===rmonth);return b;},[rlData,rmonth,ryear]);
    const pie=useMemo(()=>{const cats={};twStats.forEach(x=>{cats[x.cat]=(cats[x.cat]||0)+x.val;});return[{name:"美股",value:usT.val*UDRATE},...Object.entries(cats).map(([n,v])=>({name:n,value:v}))].filter(d=>d.value>0);},[usT,twStats]);
    const yrPnl=yrItems.reduce((a,x)=>a+(x.s-x.p),0);
    const yrCost=yrItems.reduce((a,x)=>a+x.p,0);
    const prevRl=rf.p&&rf.s&&+rf.p>0?{pnl:+rf.s-+rf.p,roi:calcR(+rf.p,+rf.s)}:null;

    const doFetch=useCallback(async()=>{
      setFetch(true);setFmsg("搜尋中…");
      try{
        const px=await fetchPrices(usData.map(x=>x.sym));
        sUs(prev=>prev.map(x=>{const pr=px[x.sym]||px[x.sym.toUpperCase()];return pr?{...x,cp:pr}:x;}));
        setLupd(new Date().toLocaleTimeString("zh-TW",{hour:"2-digit",minute:"2-digit"}));
        setFmsg("✓ 已更新 "+Object.keys(px).length+" 支");
        setTimeout(()=>setFmsg(""),3000);
      }catch(e){setFmsg("❌ 更新失敗");setTimeout(()=>setFmsg(""),4000);}
      setFetch(false);
    },[usData]);

    const openAdd=t=>{setEdit(null);if(t==="us")setUf({sym:"",qty:"",bp:"",bd:tod()});else if(t==="tw")setTf({cat:"台股",name:"",qty:"",bp:"",cp:"",bd:tod(),cur:"TWD"});else setRf({cat:"基金",name:"",p:"",s:"",d:tod()});setModal(t);};
    const openEdit=(t,x)=>{setEdit(x);if(t==="us")setUf({sym:x.sym,qty:""+x.qty,bp:""+x.bp,bd:x.bd});else if(t==="tw")setTf({cat:x.cat,name:x.name,qty:""+x.qty,bp:""+x.bp,cp:""+x.cp,bd:x.bd,cur:x.cur});else setRf({cat:x.cat,name:x.name,p:""+x.p,s:""+x.s,d:x.d});setModal(t);};
    const saveUs=()=>{if(!uf.sym||!uf.qty||!uf.bp)return;const sym=uf.sym.toUpperCase().trim();const e={sym,qty:+uf.qty,bp:+uf.bp,cp:+uf.bp,bd:uf.bd};editObj?sUs(prev=>prev.map(x=>x.id===editObj.id?{...e,id:x.id}:x)):sUs(prev=>[...prev,{...e,id:"u"+Date.now()}]);setModal(null);};
    const saveTw=()=>{if(!tf.name||!tf.qty||!tf.bp||!tf.cp)return;const e={...tf,qty:+tf.qty,bp:+tf.bp,cp:+tf.cp};editObj?sTw(prev=>prev.map(x=>x.id===editObj.id?{...e,id:x.id}:x)):sTw(prev=>[...prev,{...e,id:"t"+Date.now()}]);setModal(null);};
    const saveRl=()=>{if(!rf.name||!rf.p||!rf.s||!rf.d)return;const e={...rf,p:+rf.p,s:+rf.s};editObj?sRl(prev=>prev.map(x=>x.id===editObj.id?{...e,id:x.id}:x)):sRl(prev=>[...prev,{...e,id:"r"+Date.now()}]);setModal(null);};

    const BT=({active,payload})=>{if(!active||!payload||!payload.length||!payload[0].payload.count)return null;const d=payload[0].payload;return h("div",{style:{background:CARD,border:"1px solid "+BDR,borderRadius:10,padding:"10px 14px",fontSize:12}},h("b",{style:{color:T1}},d.month),h("div",{style:{color:GRN,marginTop:3}},"損益 "+fmt(d.pnl)),h("div",{style:{color:T3,marginTop:2}},"ROI "+d.roi.toFixed(1)+"% · "+d.count+"筆"));};

    // ── HEADER ──
    const header=h("div",{style:{background:CARD,borderBottom:"1px solid "+BDR,padding:"16px 18px 12px",position:"sticky",top:0,zIndex:20}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center"}},
        h("div",null,
          h("div",{style:rnd({fontSize:21,color:T1})},"投資收益"),
          h("div",{style:{fontSize:10,color:T3,letterSpacing:1.2,marginTop:1}},"PORTFOLIO TRACKER")
        ),
        h("div",{style:{display:"flex",gap:7}},
          h("button",{onClick:()=>openAdd("tw"),style:{fontSize:11,color:T2,background:DARK,borderRadius:16,padding:"5px 10px",fontWeight:500,border:"1px solid "+BDR}},"台灣 +"),
          h("button",{onClick:()=>openAdd("us"),style:{fontSize:11,color:BLU,background:BLUBG,borderRadius:16,padding:"5px 10px",fontWeight:600}},"美股 +"),
          h("button",{onClick:()=>openAdd("real"),style:{fontSize:11,color:"#fff",background:ACC,borderRadius:16,padding:"5px 10px",fontWeight:600}},"月報 +")
        )
      )
    );

    // ── TABS ──
    const tabs=h("div",{style:{display:"flex",background:CARD,borderBottom:"1px solid "+BDR}},
      [["overview","總覽"],["hold","持倉"],["realized","已實現"]].map(([k,l])=>
        h("button",{key:k,onClick:()=>setTab(k),style:{flex:1,padding:"10px 0",fontSize:12,fontWeight:500,color:tab===k?ACCD:T3,borderBottom:tab===k?"2.5px solid "+ACC:"2.5px solid transparent",transition:"all .2s"}},l)
      )
    );

    // ── OVERVIEW ──
    const overview=tab==="overview"&&h("div",{style:{padding:"14px 14px 0"}},
      // hero card
      h("div",{style:{background:ACCD,borderRadius:20,padding:"20px 18px",marginBottom:12}},
        h("div",{style:{fontSize:10,color:"rgba(255,255,255,.6)",letterSpacing:1.3,marginBottom:4}},"總資產（美股 + 台灣持倉）"),
        h("div",{style:rnd({fontSize:30,color:"#fff",marginBottom:2})},
          fmtK(usT.total*UDRATE+twT.val),
          h("span",{style:{fontSize:12,color:"rgba(255,255,255,.5)",marginLeft:6}},"TWD")
        ),
        h("div",{style:{fontSize:12,color:"rgba(255,255,255,.5)",marginBottom:14}},"美股 "+fmtU(usT.total)+" USD"),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}},
          [["美股未實現",(usT.pnl>=0?"+":"")+fmtU(usT.pnl),usT.pnl>=0?"#C8F0D0":"#FFD0C8"],
           ["台灣未實現",(twT.pnl>=0?"+":"")+fmtK(twT.pnl),twT.pnl>=0?"#C8F0D0":"#FFD0C8"],
           ["已實現獲利","+"+fmtK(rlT.pnl),"#EEE8D0"]
          ].map(([l,v,c])=>h("div",{key:l},h("div",{style:{fontSize:10,color:"rgba(255,255,255,.5)",marginBottom:2}},l),h("div",{style:{fontSize:12,color:c,fontWeight:600}},v)))
        )
      ),
      // US summary
      h("div",{style:{background:CARD,borderRadius:14,padding:"12px 14px",marginBottom:12,border:"1px solid "+BDR}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}},
          h("div",{style:{fontSize:12,color:T2,fontWeight:600}},"🇺🇸 美股帳戶"),
          h(Tag,{val:usT.roi,large:true})
        ),
        h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}},
          [["持倉市值",fmtU(usT.val)],["現金",fmtU(usT.cash)],["帳戶總值",fmtU(usT.total)]].map(([l,v])=>
            h("div",{key:l,style:{background:DARK,borderRadius:10,padding:"9px 10px"}},
              h("div",{style:{fontSize:10,color:T3,marginBottom:3}},l),
              h("div",{style:{fontSize:12,color:T1,fontWeight:600}},v)
            )
          )
        )
      ),
      // pie
      h("div",{style:{background:CARD,borderRadius:16,padding:14,marginBottom:12,border:"1px solid "+BDR}},
        h("div",{style:{fontSize:12,color:T2,fontWeight:600,marginBottom:12}},"資產配置"),
        h("div",{style:{display:"flex",alignItems:"center",gap:12}},
          h(ResponsiveContainer,{width:"45%",height:120},
            h(PieChart,null,
              h(Pie,{data:pie,cx:"50%",cy:"50%",innerRadius:32,outerRadius:52,paddingAngle:3,dataKey:"value"},
                pie.map((_,i)=>h(Cell,{key:i,fill:PCOLS[i%PCOLS.length]}))
              )
            )
          ),
          h("div",{style:{flex:1}},
            pie.map((item,i)=>{
              const tot=pie.reduce((a,d)=>a+d.value,0);
              return h("div",{key:item.name,style:{display:"flex",alignItems:"center",marginBottom:7}},
                h("div",{style:{width:9,height:9,borderRadius:3,background:PCOLS[i%PCOLS.length],marginRight:7,flexShrink:0}}),
                h("div",null,
                  h("div",{style:{fontSize:12,color:T1,fontWeight:500}},item.name),
                  h("div",{style:{fontSize:10,color:T3}},(item.value/tot*100).toFixed(0)+"% · "+fmtK(item.value))
                )
              );
            })
          )
        )
      ),
      // top performers
      h("div",{style:{background:CARD,borderRadius:16,padding:14,marginBottom:16,border:"1px solid "+BDR}},
        h("div",{style:{fontSize:12,color:T2,fontWeight:600,marginBottom:10}},"持倉報酬排行"),
        [...usStats.map(x=>({...x,cat:"美股"})),...twStats].sort((a,b)=>b.roi-a.roi).slice(0,6).map(item=>
          h("div",{key:item.id,style:{display:"flex",alignItems:"center",padding:"8px 0",borderBottom:"1px solid "+DARK}},
            h("div",{style:{flex:1,paddingRight:8}},
              h("div",{style:{fontSize:13,color:T1,fontWeight:600}},item.sym||item.name),
              h("div",{style:{marginTop:3}},h(Badge,{cat:item.cat}))
            ),
            h(Tag,{val:item.roi})

    // ── HOLD ──
    const hold=tab==="hold"&&h("div",{style:{padding:14}},
      h("div",{style:{display:"flex",background:DARK,borderRadius:12,padding:4,marginBottom:14}},
        [["us","🇺🇸 美股"],["tw","🇹🇼 台灣 & 基金"]].map(([k,l])=>
          h("button",{key:k,onClick:()=>setHtab(k),style:{flex:1,padding:"8px 0",borderRadius:9,fontSize:12,fontWeight:600,background:htab===k?CARD:"transparent",color:htab===k?T1:T3,transition:"all .2s"}},l)
        )
      ),
      htab==="us"&&h("div",null,
        h("div",{style:{background:CARD,borderRadius:14,padding:"12px 14px",marginBottom:12,border:"1px solid "+BDR}},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}},
            h("div",null,
              h("div",{style:{fontSize:11,color:T3}},"帳戶市值"),
              h("div",{style:rnd({fontSize:26,color:T1})},fmtU(usT.total)),
              h("div",{style:{fontSize:11,color:usT.pnl>=0?GRN:RED,fontWeight:600,marginTop:2}},(usT.pnl>=0?"+":"")+fmtU(usT.pnl)+" ("+(usT.roi>=0?"+":"")+usT.roi.toFixed(2)+"%)")
            ),
            h("button",{onClick:doFetch,disabled:fetching,style:{background:fetching?DARK:BLUBG,color:fetching?T3:BLU,borderRadius:20,padding:"8px 14px",fontSize:12,fontWeight:600,border:"1.5px solid "+(fetching?BDR:BLU+"44"),display:"flex",alignItems:"center",gap:6}},
              h("span",{style:{display:"inline-block",animation:fetching?"spin 1s linear infinite":"none"}},"↻"),
              fetching?"更新中…":"更新報價"

          ),
          h("div",{style:{display:"flex",justifyContent:"space-between"}},
            h("div",{style:{fontSize:11,color:T3}},"現金 "+fmtU(cash)+" · "+usData.length+" 支"),
            h("div",{style:{fontSize:11,fontWeight:500,color:fmsg.startsWith("✓")?GRN:fmsg.startsWith("❌")?RED:T3}},fmsg||(lupd?"更新 "+lupd:""))
          )
        ),
        [...usStats].sort((a,b)=>b.val-a.val).map(item=>
          h("div",{key:item.id,style:{background:CARD,borderRadius:14,padding:"12px 14px",marginBottom:10,border:"1px solid "+BDR}},
            h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}},

                h("div",{style:{display:"flex",alignItems:"center",gap:8}},

                h("div",{style:{fontSize:11,color:T3,marginTop:2}},item.bd+" · "+item.qty.toLocaleString()+" 股")

              h("div",{style:{textAlign:"right"}},
                h("div",{style:rnd({fontSize:18,color:T1})},fmtU(item.val)),

            h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",background:DARK,borderRadius:10,padding:"9px 10px",marginBottom:10,gap:4}},

            ),
            h("div",{style:{marginBottom:10}},
              h("div",{style:{display:"flex",justifyContent:"space-between",fontSize:10,color:T3,marginBottom:4}},
                h("span",null,"成本 "+fmtU(item.cost)),h("span",null,(item.roi>=0?"+":"")+item.roi.toFixed(1)+"%")

              h("div",{style:{background:DARK,borderRadius:4,height:5,overflow:"hidden"}},
                h("div",{style:{width:Math.min(Math.abs(item.roi)*1.5,100)+"%",height:"100%",background:item.roi>=0?GRN:RED,borderRadius:4}})

            h("div",{style:{display:"flex",justifyContent:"flex-end",gap:8}},
              h("button",{onClick:()=>openEdit("us",item),style:{fontSize:11,color:T2,background:DARK,borderRadius:8,padding:"4px 12px",fontWeight:500}},"編輯"),
              h("button",{onClick:()=>sUs(prev=>prev.filter(x=>x.id!==item.id)),style:{fontSize:11,color:RED,background:REDBG,borderRadius:8,padding:"4px 12px",fontWeight:500}},"刪除")

              h(Tag,{val:item.roi})

            h("div",{style:{display:"grid",gridTemplateColumns:"repeat(4,1fr)",background:DARK,borderRadius:10,padding:"9px 10px",marginBottom:10,gap:4}},

            ),
            h("div",{style:{display:"flex",justifyContent:"flex-end",gap:8}},
              h("button",{onClick:()=>openEdit("tw",item),style:{fontSize:11,color:T2,background:DARK,borderRadius:8,padding:"4px 12px",fontWeight:500}},"編輯"),
              h("button",{onClick:()=>sTw(prev=>prev.filter(x=>x.id!==item.id)),style:{fontSize:11,color:RED,background:REDBG,borderRadius:8,padding:"4px 12px",fontWeight:500}},"刪除")
            )

      )
    );

    // ── REALIZED ──
    const realized=tab==="realized"&&h("div",{style:{padding:14}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}},
        h("div",{style:{fontSize:13,color:T1,fontWeight:600}},"年度月報"),
        h("div",{style:{display:"flex",gap:6}},
          rlYears.map(yr=>h("button",{key:yr,onClick:()=>{setRyear(yr);setRmonth(null)},style:{padding:"5px 14px",borderRadius:50,fontSize:12,fontWeight:500,background:ryear===yr?ACC:CARD,color:ryear===yr?"#fff":T2,border:"1px solid "+(ryear===yr?ACC:BDR)}},yr))
        )
      ),
      h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}},
        h("div",{style:{background:CARD,borderRadius:14,padding:14,border:"1px solid "+BDR}},
          h("div",{style:{fontSize:11,color:T3,marginBottom:6}},ryear+" 年度損益"),
          h("div",{style:rnd({fontSize:22,color:GRN})},fmt(yrPnl)),
          h("div",{style:{fontSize:11,color:T3,marginTop:3}},yrItems.length+" 筆交易")
        ),
        h("div",{style:{background:CARD,borderRadius:14,padding:14,border:"1px solid "+BDR}},
          h("div",{style:{fontSize:11,color:T3,marginBottom:6}},"年度平均投報率"),
          h("div",{style:rnd({fontSize:22,color:T1})},"+"+String(yrCost>0?(yrPnl/yrCost*100).toFixed(1):0)+"%"),
          h("div",{style:{fontSize:11,color:T3,marginTop:3}},"投入 "+fmtK(yrCost))

      ),
      h("div",{style:{background:CARD,borderRadius:16,padding:"14px 10px 12px",marginBottom:12,border:"1px solid "+BDR}},
        h("div",{style:{fontSize:12,color:T2,fontWeight:600,marginBottom:12,paddingLeft:6}},"月度損益"),
        h(ResponsiveContainer,{width:"100%",height:145},
          h(BarChart,{data:mnBars,margin:{left:-18,right:4,top:4,bottom:0},barSize:15},
            h(XAxis,{dataKey:"month",tick:{fontSize:10,fill:T3},axisLine:false,tickLine:false}),
            h(YAxis,{tick:{fontSize:9,fill:T3},axisLine:false,tickLine:false,tickFormatter:v=>v===0?"0":(v/10000).toFixed(0)+"萬"}),
            h(Tooltip,{content:BT,cursor:{fill:"rgba(106,144,96,.08)"}}),
            h(Bar,{dataKey:"pnl",fill:ACC,radius:[5,5,0,0]})
          )
        )
      ),
      h("div",{style:{display:"flex",gap:6,overflowX:"auto",paddingBottom:12,marginBottom:4}},
        h("button",{onClick:()=>setRmonth(null),style:{flexShrink:0,padding:"5px 14px",borderRadius:50,fontSize:11,fontWeight:500,background:!rmonth?ACC:CARD,color:!rmonth?"#fff":T2,border:"1px solid "+(!rmonth?ACC:BDR)}},"全部"),
        MOS.filter(m=>yrItems.some(x=>x.d.slice(5,7)===m)).map(m=>
          h("button",{key:m,onClick:()=>setRmonth(m),style:{flexShrink:0,padding:"5px 14px",borderRadius:50,fontSize:11,fontWeight:500,background:rmonth===m?ACC:CARD,color:rmonth===m?"#fff":T2,border:"1px solid "+(rmonth===m?ACC:BDR)}},+m+"月")
        )
      ),
      filtRl.map(item=>{
        const pn=item.s-item.p, roi2=item.p>0?pn/item.p*100:0;
        return h("div",{key:item.id,style:{background:CARD,borderRadius:14,padding:"12px 14px",marginBottom:10,border:"1px solid "+BDR}},
          h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}},
            h("div",{style:{flex:1,paddingRight:8}},
              h("div",{style:{fontSize:14,color:T1,fontWeight:600}},item.name),
              h("div",{style:{display:"flex",gap:6,marginTop:4}},h(Badge,{cat:item.cat}),h("span",{style:{fontSize:10,color:T3}},"結算 "+item.d))
            ),
            h(Tag,{val:roi2})
          ),
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",background:DARK,borderRadius:10,padding:"9px 10px",marginBottom:10,gap:4}},
            [["投入本金",fmt(item.p)],["賣出市值",fmt(item.s)],["損益",(pn>=0?"+":"")+fmt(pn)]].map(([l,v],idx)=>
              h("div",{key:l},h("div",{style:{fontSize:10,color:T3,marginBottom:2}},l),h("div",{style:{fontSize:11,fontWeight:idx===2?700:500,color:idx===2?(pn>=0?GRN:RED):T1}},v))
            )
          ),
          h("div",{style:{display:"flex",justifyContent:"flex-end",gap:8}},
            h("button",{onClick:()=>openEdit("real",item),style:{fontSize:11,color:T2,background:DARK,borderRadius:8,padding:"4px 12px",fontWeight:500}},"編輯"),
            h("button",{onClick:()=>sRl(prev=>prev.filter(x=>x.id!==item.id)),style:{fontSize:11,color:RED,background:REDBG,borderRadius:8,padding:"4px 12px",fontWeight:500}},"刪除")
          )
        );
      })
    );

    // ── NAV ──
    const nav=h("div",{style:{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:CARD,borderTop:"1px solid "+BDR,display:"flex",padding:"10px 0 22px",zIndex:20}},
      [["overview","🏠","總覽"],["hold","💼","持倉"],["realized","📊","月報"]].map(([k,icon,l])=>
        h("button",{key:k,onClick:()=>setTab(k),style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,color:tab===k?ACCD:T3,fontSize:10,fontWeight:tab===k?600:400}},
          h("span",{style:{fontSize:22}},icon),l)
      )
    );

    // ── MODAL ──
    const modalEl=modal&&h("div",{style:{position:"fixed",inset:0,background:"rgba(0,0,0,.45)",display:"flex",alignItems:"flex-end",zIndex:100,backdropFilter:"blur(5px)"},onClick:e=>{if(e.target===e.currentTarget)setModal(null);}},
      h("div",{style:{background:CARD,borderRadius:"22px 22px 0 0",width:"100%",maxWidth:480,margin:"0 auto",padding:"22px 18px 36px",maxHeight:"92vh",overflowY:"auto"}},
        h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}},
          h("div",{style:rnd({fontSize:20,color:T1})},modal==="us"?(editObj?"編輯美股":"新增美股 🇺🇸"):modal==="tw"?(editObj?"編輯台灣持倉":"新增台灣 🇹🇼"):(editObj?"編輯紀錄":"新增已實現 📊")),
          h("button",{onClick:()=>setModal(null),style:{fontSize:26,color:T3}},"×")
        ),
        modal==="us"&&h("div",null,
          h("div",{style:{background:BLUBG,borderRadius:12,padding:"10px 14px",marginBottom:16,fontSize:12,color:BLU}},"💡 新增後點「更新報價」自動取得即時價格"),
          h(Inp,{label:"股票代號",value:uf.sym,onChange:v=>setUf(f=>({...f,sym:v})),ph:"NVDA",upper:true}),
          h(Inp,{label:"持股數量",value:uf.qty,onChange:v=>setUf(f=>({...f,qty:v})),type:"number",ph:"92.3"}),
          h(Inp,{label:"買入均價 (USD)",value:uf.bp,onChange:v=>setUf(f=>({...f,bp:v})),type:"number",ph:"495"}),
          h(Inp,{label:"買入日期",value:uf.bd,onChange:v=>setUf(f=>({...f,bd:v})),type:"date"}),
          h("button",{onClick:saveUs,style:{width:"100%",background:BLU,color:"#fff",borderRadius:14,padding:"13px",fontSize:14,fontWeight:600}},editObj?"儲存修改":"新增持倉")
        ),
        modal==="tw"&&h("div",null,
          h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:0}},
            h(Sel,{label:"類別",value:tf.cat,onChange:v=>setTf(f=>({...f,cat:v})),options:["台股","基金"]}),
            h(Sel,{label:"幣別",value:tf.cur,onChange:v=>setTf(f=>({...f,cur:v})),options:["TWD","USD"]})
          ),
          h(Inp,{label:"標的名稱",value:tf.name,onChange:v=>setTf(f=>({...f,name:v})),ph:"台積電 2330"}),
          h(Inp,{label:"買入均價",value:tf.bp,onChange:v=>setTf(f=>({...f,bp:v})),type:"number",ph:"680"}),
          h(Inp,{label:"現在價格",value:tf.cp,onChange:v=>setTf(f=>({...f,cp:v})),type:"number",ph:"920"}),
          h(Inp,{label:"數量",value:tf.qty,onChange:v=>setTf(f=>({...f,qty:v})),type:"number",ph:"10"}),
          h(Inp,{label:"買入日期",value:tf.bd,onChange:v=>setTf(f=>({...f,bd:v})),type:"date"}),
          tf.bp&&tf.cp&&+tf.bp>0&&h("div",{style:{background:DARK,borderRadius:12,padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}},
            h("span",{style:{fontSize:12,color:T3}},"投報率預覽"),h(Tag,{val:calcR(+tf.bp,+tf.cp),large:true})
          ),
          h("button",{onClick:saveTw,style:{width:"100%",background:ACCD,color:"#fff",borderRadius:14,padding:"13px",fontSize:14,fontWeight:600}},editObj?"儲存修改":"新增持倉")
        ),
        modal==="real"&&h("div",null,
          h(Sel,{label:"類別",value:rf.cat,onChange:v=>setRf(f=>({...f,cat:v})),options:["基金","台股","美股"]}),
          h(Inp,{label:"標的名稱",value:rf.name,onChange:v=>setRf(f=>({...f,name:v})),ph:"野村鴻運基金"}),
          h(Inp,{label:"投入本金 (NT$)",value:rf.p,onChange:v=>setRf(f=>({...f,p:v})),type:"number",ph:"190000"}),
          h(Inp,{label:"賣出市值 (NT$)",value:rf.s,onChange:v=>setRf(f=>({...f,s:v})),type:"number",ph:"235489"}),
          h(Inp,{label:"結算日期",value:rf.d,onChange:v=>setRf(f=>({...f,d:v})),type:"date"}),
          prevRl&&h("div",{style:{background:DARK,borderRadius:12,padding:"10px 14px",marginBottom:14,display:"flex",justifyContent:"space-between",alignItems:"center"}},
            h("span",{style:{fontSize:12,color:T3}},"損益預覽"),
            h("span",{style:{display:"flex",gap:8,alignItems:"center"}},
              h("span",{style:{fontSize:13,fontWeight:700,color:prevRl.pnl>=0?GRN:RED}},(prevRl.pnl>=0?"+":"")+fmt(prevRl.pnl)),
              h(Tag,{val:prevRl.roi})
            )
          ),
          h("button",{onClick:saveRl,style:{width:"100%",background:ACCD,color:"#fff",borderRadius:14,padding:"13px",fontSize:14,fontWeight:600}},editObj?"儲存修改":"新增紀錄")
        )
      )
    );

    return h("div",{style:{fontFamily:"'Noto Sans TC',sans-serif",background:BG,minHeight:"100vh",maxWidth:480,margin:"0 auto",paddingBottom:88}},
      header,tabs,overview,hold,realized,nav,modalEl
    );
  }

  ReactDOM.createRoot(document.getElementById("root")).render(h(App));
})();
</script>
