// ── API helpers ────────────────────────────────────────────────────────────
var APIBASE="https://api.anthropic.com/v1/messages";
var MODEL  ="claude-sonnet-4-20250514";

function callClaude(prompt,maxTok){
  return fetch(APIBASE,{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:MODEL,max_tokens:maxTok||800,
      tools:[{type:"web_search_20250305",name:"web_search"}],
      messages:[{role:"user",content:prompt}]
    })
  }).then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
   .then(function(d){return d.content.filter(function(b){return b.type==="text";}).map(function(b){return b.text;}).join("");});
}

// Fund search: returns [{name, nav, navDate, currency}]
function apiFundSearch(keyword){
  var prompt="搜尋台灣可購買的共同基金（含境內外基金），名稱包含「"+keyword+"」。"+
    "回傳最多8筆，純JSON陣列格式："+
    '[{"name":"基金全名","nav":13.56,"navDate":"2026-04-14","currency":"TWD"}]'+
    "。nav為最新淨值（數字），currency為TWD或USD。只回傳JSON陣列，不要其他文字。";
  return callClaude(prompt,1200).then(function(text){
    var m=text.match(/\[[\s\S]*?\]/);
    if(!m)throw new Error("no result");
    var list=JSON.parse(m[0]);
    return Array.isArray(list)?list.filter(function(f){return f.name;}):[];
  });
}

// US stock price fetch
function fetchPrices(syms){
  var prompt="Current stock prices for "+syms.join(",")+" Reply ONLY with JSON {\"AAPL\":150.25}. No markdown.";
  return callClaude(prompt,600).then(function(text){
    var m=text.match(/\{[^]*?\}/);
    if(!m)throw new Error("no json");
    return JSON.parse(m[0]);
  });
}

// ── chart components ───────────────────────────────────────────────────────
function BarChart(props){
  var bars=props.bars;
  var maxV=Math.max.apply(null,bars.map(function(b){return Math.abs(b.pnl);}));
  if(!maxV)maxV=1;
  return h("div",{style:{display:"flex",alignItems:"flex-end",height:152,gap:1,paddingBottom:24,position:"relative"}},
    bars.map(function(bar,i){
      var pct=Math.max(Math.abs(bar.pnl)/maxV*120,bar.pnl!==0?3:0);
      return h("div",{key:i,style:{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"flex-end",height:"100%",position:"relative"},
        onClick:function(){if(props.onHover)props.onHover(props.onHover===bar?null:bar);}},
        h("div",{style:{width:"75%",height:pct,background:bar.pnl>0?ACC:bar.pnl<0?RED:DARK,borderRadius:"3px 3px 0 0",transition:"height .4s"}}),
        h("div",{style:{fontSize:9,color:T3,position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",whiteSpace:"nowrap"}},bar.month)
      );
    })
  );
}

function DonutChart(props){
  var slices=props.slices||[];
  var total=slices.reduce(function(a,s){return a+s.value;},0);
  if(!total)return null;
  var r=44,cx=60,cy=60;
  var offset=0;
  return h("svg",{viewBox:"0 0 120 120",width:110,height:110},
    slices.map(function(sl,i){
      var pct=sl.value/total;
      var arc=pct*2*Math.PI;
      var sa=offset-Math.PI/2, ea=sa+arc;
      var x1=cx+r*Math.cos(sa),y1=cy+r*Math.sin(sa);
      var x2=cx+r*Math.cos(ea),y2=cy+r*Math.sin(ea);
      var d="M "+x1+" "+y1+" A "+r+" "+r+" 0 "+(arc>Math.PI?1:0)+" 1 "+x2+" "+y2;
      offset+=arc;
      return h("path",{key:i,d:d,fill:"none",stroke:PCOLS[i%PCOLS.length],strokeWidth:20});
    })
  );
}
